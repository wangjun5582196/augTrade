<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AugTrade 交易仪表板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        @media (max-width: 1400px) {
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            color: #666;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-card .value.positive {
            color: #10b981;
        }

        .stat-card .value.negative {
            color: #ef4444;
        }

        .stat-card .value.neutral {
            color: #3b82f6;
        }

        .stat-card .sub-value {
            color: #999;
            font-size: 12px;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 1024px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            font-size: 12px;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        table tr:last-child td {
            border-bottom: none;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge.long {
            background: #dcfce7;
            color: #166534;
        }

        .badge.short {
            background: #fee2e2;
            color: #991b1b;
        }

        .badge.buy {
            background: #dbeafe;
            color: #1e40af;
        }

        .badge.sell {
            background: #fef3c7;
            color: #92400e;
        }

        .profit {
            color: #10b981;
            font-weight: 600;
        }

        .loss {
            color: #ef4444;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s ease;
        }

        .refresh-btn:hover {
            transform: scale(1.05);
        }

        .refresh-btn:active {
            transform: scale(0.95);
        }

        .close-all-btn {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .close-all-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3);
        }

        .close-all-btn:active {
            transform: scale(0.95);
        }

        .close-all-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .close-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .close-btn:hover {
            background: #dc2626;
            transform: scale(1.05);
        }

        .close-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            margin: 15% auto;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .modal-body {
            color: #666;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .modal-btn.cancel {
            background: #f3f4f6;
            color: #666;
        }

        .modal-btn.cancel:hover {
            background: #e5e7eb;
        }

        .modal-btn.confirm {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .modal-btn.confirm:hover {
            transform: scale(1.05);
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            z-index: 2000;
            animation: slideInRight 0.3s ease;
            display: none;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast.success {
            border-left: 4px solid #10b981;
        }

        .toast.error {
            border-left: 4px solid #ef4444;
        }

        .toast.warning {
            border-left: 4px solid #f59e0b;
        }

        .chart-container {
            margin-top: 20px;
            height: 300px;
            position: relative;
        }

        .bar-chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            height: 100%;
            gap: 10px;
        }

        .bar {
            flex: 1;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px 8px 0 0;
            position: relative;
            min-height: 5px;
            transition: all 0.3s ease;
        }

        .bar.negative {
            background: linear-gradient(180deg, #ef4444 0%, #dc2626 100%);
        }

        .bar:hover {
            opacity: 0.8;
        }

        .bar-label {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #666;
            white-space: nowrap;
        }

        .bar-value {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            font-weight: 600;
            color: #333;
            white-space: nowrap;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .strategy-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .strategy-item h4 {
            color: #333;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .strategy-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .strategy-stats span {
            font-size: 13px;
            color: #666;
        }

        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 10px;
        }

        .auto-refresh label {
            font-size: 14px;
            color: #666;
        }

        .auto-refresh input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
    </style>
    <!-- Lightweight Charts Library -->
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🚀 AugTrade 交易仪表板</h1>
            <p>实时监控您的交易表现和策略执行情况</p>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                <div style="color: #999; font-size: 12px;" id="lastUpdate">最后更新: --</div>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <div class="auto-refresh">
                        <label for="autoRefresh">自动刷新</label>
                        <input type="checkbox" id="autoRefresh" checked>
                    </div>
                    <button class="refresh-btn" onclick="loadAllData()">🔄 刷新数据</button>
                </div>
            </div>
        </div>

        <!-- Stats Overview -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>💰 黄金价格</h3>
                <div class="value neutral" id="goldPrice">--</div>
                <div class="sub-value">XAUTUSDT</div>
            </div>
            <div class="stat-card">
                <h3>今日盈亏</h3>
                <div class="value neutral" id="todayPnl">--</div>
                <div class="sub-value" id="todayTrades">今日交易: --</div>
            </div>
            <div class="stat-card">
                <h3>今日胜率</h3>
                <div class="value neutral" id="todayWinRate">--</div>
                <div class="sub-value" id="todayWinLoss">胜/负: --</div>
            </div>
            <div class="stat-card">
                <h3>未实现盈亏</h3>
                <div class="value neutral" id="unrealizedPnl">--</div>
                <div class="sub-value" id="openPositions">持仓: --</div>
            </div>
            <div class="stat-card">
                <h3>总盈亏</h3>
                <div class="value neutral" id="totalPnl">--</div>
                <div class="sub-value">累计盈亏</div>
            </div>
            <div class="stat-card">
                <h3>总胜率</h3>
                <div class="value neutral" id="winRate">--</div>
                <div class="sub-value" id="totalTrades">总交易: --</div>
            </div>
        </div>

        <!-- Content Grid -->
        <div class="content-grid">
            <!-- Current Positions -->
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="margin: 0;">💼 当前持仓</h2>
                    <button class="close-all-btn" onclick="closeAllPositions()" id="closeAllBtn">
                        ⚠️ 一键平仓
                    </button>
                </div>
                <div id="positionsContent" class="loading">加载中...</div>
            </div>

            <!-- Strategy Stats -->
            <div class="card">
                <h2>📊 策略表现</h2>
                <div id="strategyContent" class="loading">加载中...</div>
            </div>

            <!-- Today's Profit/Loss Pie Chart -->
            <div class="card">
                <h2>🥧 今日盈亏分布</h2>
                <div id="todayPieChart" style="height: 300px; position: relative;">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <!-- Daily PnL Chart -->
            <div class="card">
                <h2>📈 近7日盈亏趋势</h2>
                <div id="dailyPnlChart" class="chart-container">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <!-- Cumulative Profit Chart -->
            <div class="card full-width">
                <h2>💹 累计盈利曲线</h2>
                <div id="cumulativeProfitChart" style="height: 350px; position: relative;">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <!-- Daily Profit Line Chart -->
            <div class="card full-width">
                <h2>📊 每日盈亏曲线</h2>
                <div id="dailyProfitLineChart" style="height: 350px; position: relative;">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <!-- Recent Trades -->
            <div class="card full-width">
                <h2>📋 最近交易记录</h2>
                <div id="recentTradesContent" class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        let autoRefreshInterval;
        let goldPriceInterval;

        // Load all data
        async function loadAllData() {
            await Promise.all([
                loadOverview(),
                loadPositions(),
                loadStrategyStats(),
                loadDailyPnl(),
                loadRecentTrades(),
                loadGoldPrice(),
                loadCumulativeProfitChart(),
                loadDailyProfitLineChart(),
                loadTodayPieChart()
            ]);
            
            document.getElementById('lastUpdate').textContent = 
                `最后更新: ${new Date().toLocaleString('zh-CN')}`;
        }

        // Load overview statistics
        async function loadOverview() {
            try {
                const response = await fetch('/api/dashboard/overview');
                const data = await response.json();
                
                if (data.success) {
                    updateStatCard('totalPnl', data.totalProfitLoss);
                    updateStatCard('todayPnl', data.todayProfitLoss);
                    updateStatCard('unrealizedPnl', data.unrealizedPnl);
                    
                    document.getElementById('todayTrades').textContent = 
                        `今日交易: ${data.todayTrades}`;
                    document.getElementById('openPositions').textContent = 
                        `持仓: ${data.openPositionsCount}`;
                    document.getElementById('winRate').textContent = `${data.winRate}%`;
                    document.getElementById('totalTrades').textContent = 
                        `总交易: ${data.totalTrades}`;
                    
                    // 更新今日胜率
                    const todayWinRateElement = document.getElementById('todayWinRate');
                    todayWinRateElement.textContent = `${data.todayWinRate}%`;
                    todayWinRateElement.className = 'value';
                    const winRateValue = parseFloat(data.todayWinRate);
                    if (winRateValue >= 50) {
                        todayWinRateElement.classList.add('positive');
                    } else if (winRateValue > 0) {
                        todayWinRateElement.classList.add('neutral');
                    } else {
                        todayWinRateElement.classList.add('neutral');
                    }
                    document.getElementById('todayWinLoss').textContent = 
                        `胜/负: ${data.todayWinTrades}/${data.todayLossTrades}`;
                }
            } catch (error) {
                console.error('加载概览数据失败:', error);
            }
        }

        // Update stat card with color
        function updateStatCard(id, value) {
            const element = document.getElementById(id);
            element.textContent = formatCurrency(value);
            
            element.className = 'value';
            if (value > 0) {
                element.classList.add('positive');
            } else if (value < 0) {
                element.classList.add('negative');
            } else {
                element.classList.add('neutral');
            }
        }

        // Load positions
        async function loadPositions() {
            try {
                const response = await fetch('/api/dashboard/positions');
                const data = await response.json();
                
                const container = document.getElementById('positionsContent');
                const closeAllBtn = document.getElementById('closeAllBtn');
                
                if (data.success && data.count > 0) {
                    closeAllBtn.disabled = false;
                    let html = '<table><thead><tr><th>交易对</th><th>方向</th><th>数量</th><th>均价</th><th>当前价</th><th>盈亏</th><th>操作</th></tr></thead><tbody>';
                    
                    data.data.forEach(pos => {
                        const pnlClass = pos.unrealizedPnl >= 0 ? 'profit' : 'loss';
                        html += `
                            <tr>
                                <td><strong>${pos.symbol}</strong></td>
                                <td><span class="badge ${pos.direction.toLowerCase()}">${pos.direction}</span></td>
                                <td>${pos.quantity}</td>
                                <td>${formatCurrency(pos.avgPrice)}</td>
                                <td>${formatCurrency(pos.currentPrice)}</td>
                                <td class="${pnlClass}">${formatCurrency(pos.unrealizedPnl)}</td>
                                <td>
                                    <button class="close-btn" onclick="closeSinglePosition('${pos.positionId}', '${pos.symbol}')">
                                        平仓
                                    </button>
                                </td>
                            </tr>
                        `;
                    });
                    
                    html += '</tbody></table>';
                    container.innerHTML = html;
                } else {
                    closeAllBtn.disabled = true;
                    container.innerHTML = '<div class="empty-state">暂无持仓</div>';
                }
            } catch (error) {
                console.error('加载持仓数据失败:', error);
                document.getElementById('positionsContent').innerHTML = 
                    '<div class="empty-state">加载失败</div>';
            }
        }

        // Load strategy statistics
        async function loadStrategyStats() {
            try {
                const response = await fetch('/api/dashboard/strategy-stats');
                const data = await response.json();
                
                const container = document.getElementById('strategyContent');
                
                if (data.success && data.count > 0) {
                    let html = '';
                    
                    data.data.forEach(strategy => {
                        const pnlClass = strategy.totalPnl >= 0 ? 'profit' : 'loss';
                        html += `
                            <div class="strategy-item">
                                <h4>${strategy.strategyName}</h4>
                                <div class="strategy-stats">
                                    <span>交易: ${strategy.totalTrades}</span>
                                    <span>胜: ${strategy.winTrades}</span>
                                    <span>负: ${strategy.lossTrades}</span>
                                    <span>胜率: ${strategy.winRate}%</span>
                                    <span class="${pnlClass}">盈亏: ${formatCurrency(strategy.totalPnl)}</span>
                                </div>
                            </div>
                        `;
                    });
                    
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<div class="empty-state">暂无策略数据</div>';
                }
            } catch (error) {
                console.error('加载策略数据失败:', error);
                document.getElementById('strategyContent').innerHTML = 
                    '<div class="empty-state">加载失败</div>';
            }
        }

        // Load daily PnL chart
        async function loadDailyPnl() {
            try {
                const response = await fetch('/api/dashboard/daily-pnl?days=7');
                const data = await response.json();
                
                const container = document.getElementById('dailyPnlChart');
                
                if (data.success && data.count > 0) {
                    const maxPnl = Math.max(...data.data.map(d => Math.abs(d.pnl)));
                    
                    let html = '<div class="bar-chart">';
                    
                    data.data.forEach(day => {
                        const height = maxPnl > 0 ? (Math.abs(day.pnl) / maxPnl) * 100 : 5;
                        const isNegative = day.pnl < 0;
                        const barClass = isNegative ? 'bar negative' : 'bar';
                        
                        html += `
                            <div class="${barClass}" style="height: ${height}%">
                                <div class="bar-value">${formatCurrency(day.pnl)}</div>
                                <div class="bar-label">${formatDate(day.date)}</div>
                            </div>
                        `;
                    });
                    
                    html += '</div>';
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<div class="empty-state">暂无数据</div>';
                }
            } catch (error) {
                console.error('加载每日盈亏数据失败:', error);
                document.getElementById('dailyPnlChart').innerHTML = 
                    '<div class="empty-state">加载失败</div>';
            }
        }

        // Load recent trades
        async function loadRecentTrades() {
            try {
                const response = await fetch('/api/dashboard/recent-trades?limit=20');
                const data = await response.json();
                
                const container = document.getElementById('recentTradesContent');
                
                if (data.success && data.count > 0) {
                    let html = '<table><thead><tr><th>时间</th><th>交易对</th><th>方向</th><th>数量</th><th>价格</th><th>策略</th><th>盈亏</th></tr></thead><tbody>';
                    
                    data.data.forEach(trade => {
                        const pnlClass = trade.profitLoss >= 0 ? 'profit' : 'loss';
                        html += `
                            <tr>
                                <td>${formatDateTime(trade.executedTime)}</td>
                                <td><strong>${trade.symbol}</strong></td>
                                <td><span class="badge ${trade.side.toLowerCase()}">${trade.side}</span></td>
                                <td>${trade.executedQuantity}</td>
                                <td>${formatCurrency(trade.executedPrice)}</td>
                                <td>${trade.strategyName || '-'}</td>
                                <td class="${pnlClass}">${formatCurrency(trade.profitLoss || 0)}</td>
                            </tr>
                        `;
                    });
                    
                    html += '</tbody></table>';
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<div class="empty-state">暂无交易记录</div>';
                }
            } catch (error) {
                console.error('加载交易记录失败:', error);
                document.getElementById('recentTradesContent').innerHTML = 
                    '<div class="empty-state">加载失败</div>';
            }
        }

        // Format currency
        function formatCurrency(value) {
            if (value === null || value === undefined) return '--';
            const num = parseFloat(value);
            return num >= 0 ? `$${num.toFixed(2)}` : `-$${Math.abs(num).toFixed(2)}`;
        }

        // Format date
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return `${date.getMonth() + 1}/${date.getDate()}`;
        }

        // Format datetime
        function formatDateTime(dateTimeStr) {
            if (!dateTimeStr) return '--';
            const date = new Date(dateTimeStr);
            return `${date.getMonth() + 1}/${date.getDate()} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
        }

        // Auto refresh toggle
        document.getElementById('autoRefresh').addEventListener('change', function(e) {
            if (e.target.checked) {
                // Start auto refresh every 10 seconds
                autoRefreshInterval = setInterval(loadAllData, 10000);
                // Start gold price real-time refresh every 5 seconds
                goldPriceInterval = setInterval(loadGoldPrice, 5000);
            } else {
                // Stop auto refresh
                if (autoRefreshInterval) {
                    clearInterval(autoRefreshInterval);
                }
                if (goldPriceInterval) {
                    clearInterval(goldPriceInterval);
                }
            }
        });

        // Initial load
        loadAllData();

        // Start auto refresh (every 10 seconds)
        autoRefreshInterval = setInterval(loadAllData, 10000);
        
        // Start gold price real-time refresh (every 5 seconds)
        goldPriceInterval = setInterval(loadGoldPrice, 5000);

        // Close all positions
        async function closeAllPositions() {
            const modal = showModal(
                '⚠️ 确认平仓',
                '确定要平掉所有持仓吗？此操作不可撤销！',
                '取消',
                '确认平仓'
            );

            const confirmed = await modal;
            if (!confirmed) return;

            try {
                showToast('正在平仓...', 'warning');
                
                const response = await fetch('/api/trading/close-all', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const result = await response.json();

                if (result.success) {
                    showToast(`✅ 成功平仓 ${result.closedCount} 个持仓`, 'success');
                    await loadAllData();
                } else {
                    showToast(`❌ 平仓失败: ${result.message}`, 'error');
                }
            } catch (error) {
                console.error('平仓失败:', error);
                showToast('❌ 平仓请求失败，请重试', 'error');
            }
        }

        // Close single position
        async function closeSinglePosition(positionId, symbol) {
            const modal = showModal(
                '⚠️ 确认平仓',
                `确定要平掉 ${symbol} 的持仓吗？`,
                '取消',
                '确认平仓'
            );

            const confirmed = await modal;
            if (!confirmed) return;

            try {
                showToast('正在平仓...', 'warning');
                
                const response = await fetch(`/api/trading/close/${positionId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const result = await response.json();

                if (result.success) {
                    showToast(`✅ ${symbol} 平仓成功`, 'success');
                    await loadAllData();
                } else {
                    showToast(`❌ 平仓失败: ${result.message}`, 'error');
                }
            } catch (error) {
                console.error('平仓失败:', error);
                showToast('❌ 平仓请求失败，请重试', 'error');
            }
        }

        // Show modal
        function showModal(title, message, cancelText, confirmText) {
            return new Promise((resolve) => {
                // Create modal HTML
                const modalHTML = `
                    <div id="confirmModal" class="modal" style="display: block;">
                        <div class="modal-content">
                            <div class="modal-header">${title}</div>
                            <div class="modal-body">${message}</div>
                            <div class="modal-footer">
                                <button class="modal-btn cancel" onclick="closeModal(false)">${cancelText}</button>
                                <button class="modal-btn confirm" onclick="closeModal(true)">${confirmText}</button>
                            </div>
                        </div>
                    </div>
                `;

                // Add to body
                document.body.insertAdjacentHTML('beforeend', modalHTML);

                // Store resolve function
                window.modalResolve = resolve;
            });
        }

        // Close modal
        function closeModal(confirmed) {
            const modal = document.getElementById('confirmModal');
            if (modal) {
                modal.style.display = 'none';
                modal.remove();
            }
            if (window.modalResolve) {
                window.modalResolve(confirmed);
                window.modalResolve = null;
            }
        }

        // Load gold price from Bybit
        async function loadGoldPrice() {
            try {
                const response = await fetch('/api/dashboard/gold-price');
                const data = await response.json();
                
                if (data.success && data.price) {
                    const price = parseFloat(data.price);
                    const element = document.getElementById('goldPrice');
                    element.textContent = `$${price.toFixed(2)}`;
                    element.className = 'value neutral';
                } else {
                    document.getElementById('goldPrice').textContent = '--';
                }
            } catch (error) {
                console.error('加载黄金价格失败:', error);
                document.getElementById('goldPrice').textContent = '--';
            }
        }

        // Load and render cumulative profit chart
        let cumulativeChart = null;
        let cumulativeSeries = null;

        async function loadCumulativeProfitChart() {
            const container = document.getElementById('cumulativeProfitChart');
            
            try {
                // 获取所有交易记录
                const response = await fetch('/api/dashboard/recent-trades?limit=1000');
                const data = await response.json();
                
                if (data.success && data.count > 0) {
                    // 按时间排序
                    const trades = data.data.sort((a, b) => 
                        new Date(a.executedTime) - new Date(b.executedTime)
                    );
                    
                    // 计算累计盈亏
                    let cumulative = 0;
                    const chartData = trades.map(trade => {
                        cumulative += parseFloat(trade.profitLoss || 0);
                        
                        const timestamp = new Date(trade.executedTime).getTime() / 1000;
                        
                        return {
                            time: timestamp,
                            value: cumulative
                        };
                    });
                    
                    // 渲染图表
                    renderCumulativeChart(chartData);
                } else {
                    container.innerHTML = '<div class="empty-state">暂无交易数据</div>';
                }
            } catch (error) {
                console.error('加载累计盈利曲线失败:', error);
                container.innerHTML = '<div class="empty-state">加载失败</div>';
            }
        }

        function renderCumulativeChart(chartData) {
            const container = document.getElementById('cumulativeProfitChart');
            container.innerHTML = '';
            
            // 创建图表
            cumulativeChart = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: 350,
                layout: {
                    background: { color: '#ffffff' },
                    textColor: '#333',
                },
                grid: {
                    vertLines: { color: '#f0f0f0' },
                    horzLines: { color: '#f0f0f0' },
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal,
                },
                rightPriceScale: {
                    borderColor: '#d1d4dc',
                },
                timeScale: {
                    borderColor: '#d1d4dc',
                    timeVisible: true,
                    secondsVisible: false,
                },
            });

            // 添加面积图系列（更美观）
            cumulativeSeries = cumulativeChart.addAreaSeries({
                topColor: 'rgba(38, 166, 154, 0.4)',
                bottomColor: 'rgba(38, 166, 154, 0.0)',
                lineColor: 'rgba(38, 166, 154, 1)',
                lineWidth: 2,
            });

            // 设置数据
            cumulativeSeries.setData(chartData);

            // 自适应内容
            cumulativeChart.timeScale().fitContent();

            // 窗口大小变化时调整
            window.addEventListener('resize', () => {
                if (cumulativeChart) {
                    cumulativeChart.applyOptions({ 
                        width: container.clientWidth 
                    });
                }
            });
        }

        // Load and render daily profit line chart
        let dailyLineChart = null;
        let dailyLineSeries = null;

        async function loadDailyProfitLineChart() {
            const container = document.getElementById('dailyProfitLineChart');
            
            try {
                const response = await fetch('/api/dashboard/daily-pnl?days=30');
                const data = await response.json();
                
                if (data.success && data.count > 0) {
                    const chartData = data.data.map(day => {
                        const date = new Date(day.date);
                        const timestamp = date.getTime() / 1000;
                        
                        return {
                            time: timestamp,
                            value: parseFloat(day.pnl)
                        };
                    });
                    
                    renderDailyLineChart(chartData);
                } else {
                    container.innerHTML = '<div class="empty-state">暂无数据</div>';
                }
            } catch (error) {
                console.error('加载每日盈亏曲线失败:', error);
                container.innerHTML = '<div class="empty-state">加载失败</div>';
            }
        }

        function renderDailyLineChart(chartData) {
            const container = document.getElementById('dailyProfitLineChart');
            container.innerHTML = '';
            
            // 创建图表
            dailyLineChart = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: 350,
                layout: {
                    background: { color: '#ffffff' },
                    textColor: '#333',
                },
                grid: {
                    vertLines: { color: '#f0f0f0' },
                    horzLines: { color: '#f0f0f0' },
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal,
                },
                rightPriceScale: {
                    borderColor: '#d1d4dc',
                },
                timeScale: {
                    borderColor: '#d1d4dc',
                    timeVisible: true,
                    secondsVisible: false,
                },
            });

            // 添加折线图系列
            dailyLineSeries = dailyLineChart.addLineSeries({
                color: '#667eea',
                lineWidth: 3,
            });

            // 设置数据
            dailyLineSeries.setData(chartData);

            // 添加零线标记
            dailyLineChart.addLineSeries({
                color: '#999999',
                lineWidth: 1,
                lineStyle: 2, // dashed
                priceLineVisible: false,
            }).setData(chartData.map(d => ({ time: d.time, value: 0 })));

            // 自适应内容
            dailyLineChart.timeScale().fitContent();

            // 窗口大小变化时调整
            window.addEventListener('resize', () => {
                if (dailyLineChart) {
                    dailyLineChart.applyOptions({ 
                        width: container.clientWidth 
                    });
                }
            });
        }

        // Show toast notification
        function showToast(message, type = 'success') {
            // Remove existing toast
            const existingToast = document.getElementById('toast');
            if (existingToast) {
                existingToast.remove();
            }

            // Create toast HTML
            const toastHTML = `
                <div id="toast" class="toast ${type}" style="display: block;">
                    ${message}
                </div>
            `;

            // Add to body
            document.body.insertAdjacentHTML('beforeend', toastHTML);

            // Auto remove after 3 seconds
            setTimeout(() => {
                const toast = document.getElementById('toast');
                if (toast) {
                    toast.style.animation = 'slideInRight 0.3s ease reverse';
                    setTimeout(() => toast.remove(), 300);
                }
            }, 3000);
        }

        // Load and render today's profit/loss pie chart
        async function loadTodayPieChart() {
            const container = document.getElementById('todayPieChart');
            
            try {
                const response = await fetch('/api/dashboard/overview');
                const data = await response.json();
                
                if (data.success) {
                    const profit = parseFloat(data.todayProfit) || 0;
                    const loss = parseFloat(data.todayLoss) || 0;
                    
                    // 如果今日没有交易，显示空状态
                    if (profit === 0 && loss === 0) {
                        container.innerHTML = '<div class="empty-state">今日暂无交易数据</div>';
                        return;
                    }
                    
                    // 渲染饼图
                    renderPieChart(profit, loss);
                } else {
                    container.innerHTML = '<div class="empty-state">加载失败</div>';
                }
            } catch (error) {
                console.error('加载今日盈亏分布失败:', error);
                container.innerHTML = '<div class="empty-state">加载失败</div>';
            }
        }

        function renderPieChart(profit, loss) {
            const container = document.getElementById('todayPieChart');
            container.innerHTML = '';
            
            const total = profit + loss;
            const profitPercentage = total > 0 ? (profit / total * 100) : 0;
            const lossPercentage = total > 0 ? (loss / total * 100) : 0;
            
            // 创建SVG饼图
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('width', '100%');
            svg.setAttribute('height', '100%');
            svg.setAttribute('viewBox', '0 0 200 200');
            
            const centerX = 100;
            const centerY = 100;
            const radius = 70;
            
            // 计算饼图路径
            function polarToCartesian(centerX, centerY, radius, angleInDegrees) {
                const angleInRadians = (angleInDegrees - 90) * Math.PI / 180.0;
                return {
                    x: centerX + (radius * Math.cos(angleInRadians)),
                    y: centerY + (radius * Math.sin(angleInRadians))
                };
            }
            
            function describeArc(x, y, radius, startAngle, endAngle) {
                const start = polarToCartesian(x, y, radius, endAngle);
                const end = polarToCartesian(x, y, radius, startAngle);
                const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";
                
                return [
                    "M", start.x, start.y,
                    "A", radius, radius, 0, largeArcFlag, 0, end.x, end.y,
                    "L", x, y,
                    "Z"
                ].join(" ");
            }
            
            // 绘制盈利部分（绿色）
            if (profitPercentage > 0) {
                const profitPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                const profitAngle = profitPercentage * 3.6;
                profitPath.setAttribute('d', describeArc(centerX, centerY, radius, 0, profitAngle));
                profitPath.setAttribute('fill', '#10b981');
                profitPath.setAttribute('stroke', '#ffffff');
                profitPath.setAttribute('stroke-width', '2');
                svg.appendChild(profitPath);
            }
            
            // 绘制亏损部分（红色）
            if (lossPercentage > 0) {
                const lossPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                const profitAngle = profitPercentage * 3.6;
                const totalAngle = 360;
                lossPath.setAttribute('d', describeArc(centerX, centerY, radius, profitAngle, totalAngle));
                lossPath.setAttribute('fill', '#ef4444');
                lossPath.setAttribute('stroke', '#ffffff');
                lossPath.setAttribute('stroke-width', '2');
                svg.appendChild(lossPath);
            }
            
            container.appendChild(svg);
            
            // 添加图例和数据
            const legend = document.createElement('div');
            legend.style.cssText = 'display: flex; justify-content: center; align-items: center; gap: 30px; margin-top: 20px; flex-wrap: wrap;';
            
            const profitLegend = document.createElement('div');
            profitLegend.style.cssText = 'display: flex; align-items: center; gap: 10px;';
            profitLegend.innerHTML = `
                <div style="width: 20px; height: 20px; background: #10b981; border-radius: 4px;"></div>
                <div style="font-size: 14px; color: #333;">
                    <strong>盈利</strong>: $${profit.toFixed(2)} (${profitPercentage.toFixed(1)}%)
                </div>
            `;
            
            const lossLegend = document.createElement('div');
            lossLegend.style.cssText = 'display: flex; align-items: center; gap: 10px;';
            lossLegend.innerHTML = `
                <div style="width: 20px; height: 20px; background: #ef4444; border-radius: 4px;"></div>
                <div style="font-size: 14px; color: #333;">
                    <strong>亏损</strong>: $${loss.toFixed(2)} (${lossPercentage.toFixed(1)}%)
                </div>
            `;
            
            legend.appendChild(profitLegend);
            legend.appendChild(lossLegend);
            container.appendChild(legend);
            
            // 添加净盈亏
            const netPnl = profit - loss;
            const netPnlDiv = document.createElement('div');
            netPnlDiv.style.cssText = 'text-align: center; margin-top: 15px; font-size: 16px; font-weight: bold;';
            netPnlDiv.innerHTML = `
                <span style="color: #666;">净盈亏: </span>
                <span style="color: ${netPnl >= 0 ? '#10b981' : '#ef4444'};">
                    ${netPnl >= 0 ? '+' : ''}$${netPnl.toFixed(2)}
                </span>
            `;
            container.appendChild(netPnlDiv);
        }

    </script>
