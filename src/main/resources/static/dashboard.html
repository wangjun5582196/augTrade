<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AugTrade 交易仪表板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            color: #666;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-card .value.positive {
            color: #10b981;
        }

        .stat-card .value.negative {
            color: #ef4444;
        }

        .stat-card .value.neutral {
            color: #3b82f6;
        }

        .stat-card .sub-value {
            color: #999;
            font-size: 12px;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 1024px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            font-size: 12px;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        table tr:last-child td {
            border-bottom: none;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge.long {
            background: #dcfce7;
            color: #166534;
        }

        .badge.short {
            background: #fee2e2;
            color: #991b1b;
        }

        .badge.buy {
            background: #dbeafe;
            color: #1e40af;
        }

        .badge.sell {
            background: #fef3c7;
            color: #92400e;
        }

        .profit {
            color: #10b981;
            font-weight: 600;
        }

        .loss {
            color: #ef4444;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s ease;
        }

        .refresh-btn:hover {
            transform: scale(1.05);
        }

        .refresh-btn:active {
            transform: scale(0.95);
        }

        .close-all-btn {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .close-all-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3);
        }

        .close-all-btn:active {
            transform: scale(0.95);
        }

        .close-all-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .close-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .close-btn:hover {
            background: #dc2626;
            transform: scale(1.05);
        }

        .close-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            margin: 15% auto;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .modal-body {
            color: #666;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .modal-btn.cancel {
            background: #f3f4f6;
            color: #666;
        }

        .modal-btn.cancel:hover {
            background: #e5e7eb;
        }

        .modal-btn.confirm {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .modal-btn.confirm:hover {
            transform: scale(1.05);
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            z-index: 2000;
            animation: slideInRight 0.3s ease;
            display: none;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast.success {
            border-left: 4px solid #10b981;
        }

        .toast.error {
            border-left: 4px solid #ef4444;
        }

        .toast.warning {
            border-left: 4px solid #f59e0b;
        }

        .chart-container {
            margin-top: 20px;
            height: 300px;
            position: relative;
        }

        .bar-chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            height: 100%;
            gap: 10px;
        }

        .bar {
            flex: 1;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px 8px 0 0;
            position: relative;
            min-height: 5px;
            transition: all 0.3s ease;
        }

        .bar.negative {
            background: linear-gradient(180deg, #ef4444 0%, #dc2626 100%);
        }

        .bar:hover {
            opacity: 0.8;
        }

        .bar-label {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #666;
            white-space: nowrap;
        }

        .bar-value {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            font-weight: 600;
            color: #333;
            white-space: nowrap;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .strategy-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .strategy-item h4 {
            color: #333;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .strategy-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .strategy-stats span {
            font-size: 13px;
            color: #666;
        }

        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 10px;
        }

        .auto-refresh label {
            font-size: 14px;
            color: #666;
        }

        .auto-refresh input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🚀 AugTrade 交易仪表板</h1>
            <p>实时监控您的交易表现和策略执行情况</p>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                <div style="color: #999; font-size: 12px;" id="lastUpdate">最后更新: --</div>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <div class="auto-refresh">
                        <label for="autoRefresh">自动刷新</label>
                        <input type="checkbox" id="autoRefresh" checked>
                    </div>
                    <button class="refresh-btn" onclick="loadAllData()">🔄 刷新数据</button>
                </div>
            </div>
        </div>

        <!-- Stats Overview -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>总盈亏</h3>
                <div class="value neutral" id="totalPnl">--</div>
                <div class="sub-value">累计交易盈亏</div>
            </div>
            <div class="stat-card">
                <h3>今日盈亏</h3>
                <div class="value neutral" id="todayPnl">--</div>
                <div class="sub-value" id="todayTrades">今日交易次数: --</div>
            </div>
            <div class="stat-card">
                <h3>未实现盈亏</h3>
                <div class="value neutral" id="unrealizedPnl">--</div>
                <div class="sub-value" id="openPositions">持仓数量: --</div>
            </div>
            <div class="stat-card">
                <h3>胜率</h3>
                <div class="value neutral" id="winRate">--</div>
                <div class="sub-value" id="totalTrades">总交易次数: --</div>
            </div>
        </div>

        <!-- Content Grid -->
        <div class="content-grid">
            <!-- Current Positions -->
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="margin: 0;">💼 当前持仓</h2>
                    <button class="close-all-btn" onclick="closeAllPositions()" id="closeAllBtn">
                        ⚠️ 一键平仓
                    </button>
                </div>
                <div id="positionsContent" class="loading">加载中...</div>
            </div>

            <!-- Strategy Stats -->
            <div class="card">
                <h2>📊 策略表现</h2>
                <div id="strategyContent" class="loading">加载中...</div>
            </div>

            <!-- Daily PnL Chart -->
            <div class="card full-width">
                <h2>📈 近7日盈亏趋势</h2>
                <div id="dailyPnlChart" class="chart-container">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <!-- Recent Trades -->
            <div class="card full-width">
                <h2>📋 最近交易记录</h2>
                <div id="recentTradesContent" class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        let autoRefreshInterval;

        // Load all data
        async function loadAllData() {
            await Promise.all([
                loadOverview(),
                loadPositions(),
                loadStrategyStats(),
                loadDailyPnl(),
                loadRecentTrades()
            ]);
            
            document.getElementById('lastUpdate').textContent = 
                `最后更新: ${new Date().toLocaleString('zh-CN')}`;
        }

        // Load overview statistics
        async function loadOverview() {
            try {
                const response = await fetch('/api/dashboard/overview');
                const data = await response.json();
                
                if (data.success) {
                    updateStatCard('totalPnl', data.totalProfitLoss);
                    updateStatCard('todayPnl', data.todayProfitLoss);
                    updateStatCard('unrealizedPnl', data.unrealizedPnl);
                    
                    document.getElementById('todayTrades').textContent = 
                        `今日交易次数: ${data.todayTrades}`;
                    document.getElementById('openPositions').textContent = 
                        `持仓数量: ${data.openPositionsCount}`;
                    document.getElementById('winRate').textContent = `${data.winRate}%`;
                    document.getElementById('totalTrades').textContent = 
                        `总交易次数: ${data.totalTrades}`;
                }
            } catch (error) {
                console.error('加载概览数据失败:', error);
            }
        }

        // Update stat card with color
        function updateStatCard(id, value) {
            const element = document.getElementById(id);
            element.textContent = formatCurrency(value);
            
            element.className = 'value';
            if (value > 0) {
                element.classList.add('positive');
            } else if (value < 0) {
                element.classList.add('negative');
            } else {
                element.classList.add('neutral');
            }
        }

        // Load positions
        async function loadPositions() {
            try {
                const response = await fetch('/api/dashboard/positions');
                const data = await response.json();
                
                const container = document.getElementById('positionsContent');
                const closeAllBtn = document.getElementById('closeAllBtn');
                
                if (data.success && data.count > 0) {
                    closeAllBtn.disabled = false;
                    let html = '<table><thead><tr><th>交易对</th><th>方向</th><th>数量</th><th>均价</th><th>当前价</th><th>盈亏</th><th>操作</th></tr></thead><tbody>';
                    
                    data.data.forEach(pos => {
                        const pnlClass = pos.unrealizedPnl >= 0 ? 'profit' : 'loss';
                        html += `
                            <tr>
                                <td><strong>${pos.symbol}</strong></td>
                                <td><span class="badge ${pos.direction.toLowerCase()}">${pos.direction}</span></td>
                                <td>${pos.quantity}</td>
                                <td>${formatCurrency(pos.avgPrice)}</td>
                                <td>${formatCurrency(pos.currentPrice)}</td>
                                <td class="${pnlClass}">${formatCurrency(pos.unrealizedPnl)}</td>
                                <td>
                                    <button class="close-btn" onclick="closeSinglePosition('${pos.positionId}', '${pos.symbol}')">
                                        平仓
                                    </button>
                                </td>
                            </tr>
                        `;
                    });
                    
                    html += '</tbody></table>';
                    container.innerHTML = html;
                } else {
                    closeAllBtn.disabled = true;
                    container.innerHTML = '<div class="empty-state">暂无持仓</div>';
                }
            } catch (error) {
                console.error('加载持仓数据失败:', error);
                document.getElementById('positionsContent').innerHTML = 
                    '<div class="empty-state">加载失败</div>';
            }
        }

        // Load strategy statistics
        async function loadStrategyStats() {
            try {
                const response = await fetch('/api/dashboard/strategy-stats');
                const data = await response.json();
                
                const container = document.getElementById('strategyContent');
                
                if (data.success && data.count > 0) {
                    let html = '';
                    
                    data.data.forEach(strategy => {
                        const pnlClass = strategy.totalPnl >= 0 ? 'profit' : 'loss';
                        html += `
                            <div class="strategy-item">
                                <h4>${strategy.strategyName}</h4>
                                <div class="strategy-stats">
                                    <span>交易: ${strategy.totalTrades}</span>
                                    <span>胜: ${strategy.winTrades}</span>
                                    <span>负: ${strategy.lossTrades}</span>
                                    <span>胜率: ${strategy.winRate}%</span>
                                    <span class="${pnlClass}">盈亏: ${formatCurrency(strategy.totalPnl)}</span>
                                </div>
                            </div>
                        `;
                    });
                    
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<div class="empty-state">暂无策略数据</div>';
                }
            } catch (error) {
                console.error('加载策略数据失败:', error);
                document.getElementById('strategyContent').innerHTML = 
                    '<div class="empty-state">加载失败</div>';
            }
        }

        // Load daily PnL chart
        async function loadDailyPnl() {
            try {
                const response = await fetch('/api/dashboard/daily-pnl?days=7');
                const data = await response.json();
                
                const container = document.getElementById('dailyPnlChart');
                
                if (data.success && data.count > 0) {
                    const maxPnl = Math.max(...data.data.map(d => Math.abs(d.pnl)));
                    
                    let html = '<div class="bar-chart">';
                    
                    data.data.forEach(day => {
                        const height = maxPnl > 0 ? (Math.abs(day.pnl) / maxPnl) * 100 : 5;
                        const isNegative = day.pnl < 0;
                        const barClass = isNegative ? 'bar negative' : 'bar';
                        
                        html += `
                            <div class="${barClass}" style="height: ${height}%">
                                <div class="bar-value">${formatCurrency(day.pnl)}</div>
                                <div class="bar-label">${formatDate(day.date)}</div>
                            </div>
                        `;
                    });
                    
                    html += '</div>';
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<div class="empty-state">暂无数据</div>';
                }
            } catch (error) {
                console.error('加载每日盈亏数据失败:', error);
                document.getElementById('dailyPnlChart').innerHTML = 
                    '<div class="empty-state">加载失败</div>';
            }
        }

        // Load recent trades
        async function loadRecentTrades() {
            try {
                const response = await fetch('/api/dashboard/recent-trades?limit=10');
                const data = await response.json();
                
                const container = document.getElementById('recentTradesContent');
                
                if (data.success && data.count > 0) {
                    let html = '<table><thead><tr><th>时间</th><th>交易对</th><th>方向</th><th>数量</th><th>价格</th><th>策略</th><th>盈亏</th></tr></thead><tbody>';
                    
                    data.data.forEach(trade => {
                        const pnlClass = trade.profitLoss >= 0 ? 'profit' : 'loss';
                        html += `
                            <tr>
                                <td>${formatDateTime(trade.executedTime)}</td>
                                <td><strong>${trade.symbol}</strong></td>
                                <td><span class="badge ${trade.side.toLowerCase()}">${trade.side}</span></td>
                                <td>${trade.executedQuantity}</td>
                                <td>${formatCurrency(trade.executedPrice)}</td>
                                <td>${trade.strategyName || '-'}</td>
                                <td class="${pnlClass}">${formatCurrency(trade.profitLoss || 0)}</td>
                            </tr>
                        `;
                    });
                    
                    html += '</tbody></table>';
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<div class="empty-state">暂无交易记录</div>';
                }
            } catch (error) {
                console.error('加载交易记录失败:', error);
                document.getElementById('recentTradesContent').innerHTML = 
                    '<div class="empty-state">加载失败</div>';
            }
        }

        // Format currency
        function formatCurrency(value) {
            if (value === null || value === undefined) return '--';
            const num = parseFloat(value);
            return num >= 0 ? `$${num.toFixed(2)}` : `-$${Math.abs(num).toFixed(2)}`;
        }

        // Format date
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return `${date.getMonth() + 1}/${date.getDate()}`;
        }

        // Format datetime
        function formatDateTime(dateTimeStr) {
            if (!dateTimeStr) return '--';
            const date = new Date(dateTimeStr);
            return `${date.getMonth() + 1}/${date.getDate()} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
        }

        // Auto refresh toggle
        document.getElementById('autoRefresh').addEventListener('change', function(e) {
            if (e.target.checked) {
                // Start auto refresh every 30 seconds
                autoRefreshInterval = setInterval(loadAllData, 30000);
            } else {
                // Stop auto refresh
                if (autoRefreshInterval) {
                    clearInterval(autoRefreshInterval);
                }
            }
        });

        // Initial load
        loadAllData();

        // Start auto refresh
        autoRefreshInterval = setInterval(loadAllData, 30000);

        // Close all positions
        async function closeAllPositions() {
            const modal = showModal(
                '⚠️ 确认平仓',
                '确定要平掉所有持仓吗？此操作不可撤销！',
                '取消',
                '确认平仓'
            );

            const confirmed = await modal;
            if (!confirmed) return;

            try {
                showToast('正在平仓...', 'warning');
                
                const response = await fetch('/api/trading/close-all', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const result = await response.json();

                if (result.success) {
                    showToast(`✅ 成功平仓 ${result.closedCount} 个持仓`, 'success');
                    await loadAllData();
                } else {
                    showToast(`❌ 平仓失败: ${result.message}`, 'error');
                }
            } catch (error) {
                console.error('平仓失败:', error);
                showToast('❌ 平仓请求失败，请重试', 'error');
            }
        }

        // Close single position
        async function closeSinglePosition(positionId, symbol) {
            const modal = showModal(
                '⚠️ 确认平仓',
                `确定要平掉 ${symbol} 的持仓吗？`,
                '取消',
                '确认平仓'
            );

            const confirmed = await modal;
            if (!confirmed) return;

            try {
                showToast('正在平仓...', 'warning');
                
                const response = await fetch(`/api/trading/close/${positionId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const result = await response.json();

                if (result.success) {
                    showToast(`✅ ${symbol} 平仓成功`, 'success');
                    await loadAllData();
                } else {
                    showToast(`❌ 平仓失败: ${result.message}`, 'error');
                }
            } catch (error) {
                console.error('平仓失败:', error);
                showToast('❌ 平仓请求失败，请重试', 'error');
            }
        }

        // Show modal
        function showModal(title, message, cancelText, confirmText) {
            return new Promise((resolve) => {
                // Create modal HTML
                const modalHTML = `
                    <div id="confirmModal" class="modal" style="display: block;">
                        <div class="modal-content">
                            <div class="modal-header">${title}</div>
                            <div class="modal-body">${message}</div>
                            <div class="modal-footer">
                                <button class="modal-btn cancel" onclick="closeModal(false)">${cancelText}</button>
                                <button class="modal-btn confirm" onclick="closeModal(true)">${confirmText}</button>
                            </div>
                        </div>
                    </div>
                `;

                // Add to body
                document.body.insertAdjacentHTML('beforeend', modalHTML);

                // Store resolve function
                window.modalResolve = resolve;
            });
        }

        // Close modal
        function closeModal(confirmed) {
            const modal = document.getElementById('confirmModal');
            if (modal) {
                modal.style.display = 'none';
                modal.remove();
            }
            if (window.modalResolve) {
                window.modalResolve(confirmed);
                window.modalResolve = null;
            }
        }

        // Show toast notification
        function showToast(message, type = 'success') {
            // Remove existing toast
            const existingToast = document.getElementById('toast');
            if (existingToast) {
                existingToast.remove();
            }

            // Create toast HTML
            const toastHTML = `
                <div id="toast" class="toast ${type}" style="display: block;">
                    ${message}
                </div>
            `;

            // Add to body
            document.body.insertAdjacentHTML('beforeend', toastHTML);

            // Auto remove after 3 seconds
            setTimeout(() => {
                const toast = document.getElementById('toast');
                if (toast) {
                    toast.style.animation = 'slideInRight 0.3s ease reverse';
                    setTimeout(() => toast.remove(), 300);
                }
            }, 3000);
        }
    </script>
</body>
</html>
