<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交易策略回测系统 - AugTrade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            text-align: center;
        }

        .header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        .panel {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .panel-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card.positive {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
        }

        .stat-card.negative {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .stat-label {
            font-size: 14px;
            color: #555;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #333;
        }

        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: #28a745;
            color: white;
        }

        .badge-danger {
            background: #dc3545;
            color: white;
        }

        .badge-warning {
            background: #ffc107;
            color: #333;
        }

        .badge-info {
            background: #17a2b8;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .hidden {
            display: none;
        }

        .clickable {
            cursor: pointer;
            color: #667eea;
            text-decoration: underline;
        }

        .clickable:hover {
            color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 交易策略回测系统</h1>
            <p>基于历史数据验证交易策略的有效性</p>
        </div>

        <!-- 回测配置面板 -->
        <div class="panel">
            <div class="panel-title">🔧 回测配置</div>
            <form id="backtestForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>交易对</label>
                        <select id="symbol" required>
                            <option value="XAUUSDT" selected>XAUUSDT (黄金/美元)</option>
                            <option value="BTCUSDT">BTCUSDT</option>
                            <option value="ETHUSDT">ETHUSDT</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>K线周期</label>
                        <select id="interval" required>
                            <option value="1m">1分钟</option>
                            <option value="5m" selected>5分钟</option>
                            <option value="15m">15分钟</option>
                            <option value="30m">30分钟</option>
                            <option value="1h">1小时</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>交易策略</label>
                        <select id="strategyName" required>
                            <option value="COMPOSITE_V3" selected>三层串联过滤 v3（当前策略）⭐</option>
                            <option value="SR_REJECTION">S/R 影线拒绝剥头皮 🆕</option>
                            <option value="COMPOSITE">组合策略（旧版加权投票）</option>
                            <option value="RSI">RSI 超买超卖</option>
                            <option value="BREAKOUT">布林带突破</option>
                            <option value="SHORT_TERM">SMA 短线交叉</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>初始资金</label>
                        <input type="number" id="initialCapital" value="10000" min="1000" step="1000" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>开始时间</label>
                        <input type="datetime-local" id="startTime" required>
                    </div>
                    <div class="form-group">
                        <label>结束时间</label>
                        <input type="datetime-local" id="endTime" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">🚀 开始回测</button>
            </form>
        </div>

        <!-- 消息提示 -->
        <div id="alertBox" class="hidden"></div>

        <!-- 回测结果列表 -->
        <div class="panel">
            <div class="panel-title">📋 历史回测记录</div>
            <button class="btn btn-secondary" onclick="loadBacktestList()">🔄 刷新列表</button>
            <div id="backtestListContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>
            </div>
        </div>

        <!-- 回测详细结果 -->
        <div id="resultPanel" class="panel hidden">
            <div class="panel-title">📈 回测结果详情</div>
            <div id="resultStats"></div>
            <div class="table-container">
                <h3 style="margin: 30px 0 15px 0;">交易明细</h3>
                <div id="tradesTable"></div>
            </div>
        </div>
    </div>

    <script>
        // 设置默认时间范围（最近7天）
        window.onload = function() {
            const endTime = new Date();
            const startTime = new Date(endTime.getTime() - 7 * 24 * 60 * 60 * 1000);
            
            document.getElementById('startTime').value = formatDateTimeLocal(startTime);
            document.getElementById('endTime').value = formatDateTimeLocal(endTime);
            
            loadBacktestList();
        };

        function formatDateTimeLocal(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day}T${hours}:${minutes}`;
        }

        // 提交回测表单
        document.getElementById('backtestForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                symbol: document.getElementById('symbol').value,
                interval: document.getElementById('interval').value,
                strategyName: document.getElementById('strategyName').value,
                initialCapital: parseFloat(document.getElementById('initialCapital').value),
                startTime: document.getElementById('startTime').value.replace('T', ' ') + ':00',
                endTime: document.getElementById('endTime').value.replace('T', ' ') + ':00'
            };
            
            showAlert('正在执行回测，请稍候...', 'info');
            
            try {
                const response = await fetch('/api/backtest/execute', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showAlert(`回测执行成功！回测ID: ${result.backtestId}`, 'success');
                    setTimeout(() => {
                        loadBacktestList();
                        loadBacktestResult(result.backtestId);
                    }, 1000);
                } else {
                    showAlert(`回测失败: ${result.message}`, 'danger');
                }
            } catch (error) {
                showAlert(`请求失败: ${error.message}`, 'danger');
            }
        });

        // 加载回测列表
        async function loadBacktestList() {
            const container = document.getElementById('backtestListContainer');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>加载中...</p></div>';
            
            try {
                const response = await fetch('/api/backtest/list');
                const result = await response.json();
                
                if (result.success && result.results.length > 0) {
                    let html = '<table><thead><tr>';
                    html += '<th>回测ID</th><th>交易对</th><th>策略</th><th>周期</th>';
                    html += '<th>初始资金</th><th>最终资金</th><th>收益率</th><th>胜率</th>';
                    html += '<th>交易次数</th><th>状态</th><th>创建时间</th><th>操作</th>';
                    html += '</tr></thead><tbody>';
                    
                    result.results.forEach(r => {
                        const profitColor = r.totalProfit >= 0 ? 'green' : 'red';
                        html += '<tr>';
                        html += `<td><span class="clickable" onclick="loadBacktestResult('${r.backtestId}')">${r.backtestId.substring(0, 8)}...</span></td>`;
                        html += `<td>${r.symbol}</td>`;
                        html += `<td>${r.strategyName}</td>`;
                        html += `<td>${r.interval}</td>`;
                        html += `<td>$${r.initialCapital.toFixed(2)}</td>`;
                        html += `<td>$${r.finalCapital ? r.finalCapital.toFixed(2) : 'N/A'}</td>`;
                        html += `<td style="color: ${profitColor}; font-weight: bold;">${r.returnRate ? r.returnRate.toFixed(2) : 'N/A'}%</td>`;
                        html += `<td>${r.winRate ? r.winRate.toFixed(2) : 'N/A'}%</td>`;
                        html += `<td>${r.totalTrades}</td>`;
                        html += `<td><span class="badge badge-${r.status === 'COMPLETED' ? 'success' : r.status === 'FAILED' ? 'danger' : 'warning'}">${r.status}</span></td>`;
                        html += `<td>${new Date(r.createTime).toLocaleString('zh-CN')}</td>`;
                        html += `<td><button class="btn btn-primary" style="padding: 5px 15px; font-size: 12px;" onclick="loadBacktestResult('${r.backtestId}')">查看详情</button></td>`;
                        html += '</tr>';
                    });
                    
                    html += '</tbody></table>';
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<p style="text-align: center; padding: 40px; color: #666;">暂无回测记录</p>';
                }
            } catch (error) {
                container.innerHTML = `<p style="text-align: center; padding: 40px; color: red;">加载失败: ${error.message}</p>`;
            }
        }

        // 加载回测结果详情
        async function loadBacktestResult(backtestId) {
            const panel = document.getElementById('resultPanel');
            const statsDiv = document.getElementById('resultStats');
            const tradesDiv = document.getElementById('tradesTable');
            
            panel.classList.remove('hidden');
            statsDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>加载中...</p></div>';
            tradesDiv.innerHTML = '';
            
            // 滚动到结果面板
            panel.scrollIntoView({ behavior: 'smooth' });
            
            try {
                // 加载回测结果
                const resultResponse = await fetch(`/api/backtest/result/${backtestId}`);
                const resultData = await resultResponse.json();
                
                if (resultData.success) {
                    const r = resultData.result;
                    let html = '<div class="stats-grid">';
                    
                    html += `<div class="stat-card ${r.totalProfit >= 0 ? 'positive' : 'negative'}">
                        <div class="stat-label">总收益</div>
                        <div class="stat-value">$${r.totalProfit.toFixed(2)}</div>
                    </div>`;
                    
                    html += `<div class="stat-card ${r.returnRate >= 0 ? 'positive' : 'negative'}">
                        <div class="stat-label">收益率</div>
                        <div class="stat-value">${r.returnRate.toFixed(2)}%</div>
                    </div>`;
                    
                    html += `<div class="stat-card">
                        <div class="stat-label">胜率</div>
                        <div class="stat-value">${r.winRate.toFixed(2)}%</div>
                    </div>`;
                    
                    html += `<div class="stat-card">
                        <div class="stat-label">总交易次数</div>
                        <div class="stat-value">${r.totalTrades}</div>
                    </div>`;
                    
                    html += `<div class="stat-card positive">
                        <div class="stat-label">盈利次数</div>
                        <div class="stat-value">${r.profitableTrades}</div>
                    </div>`;
                    
                    html += `<div class="stat-card negative">
                        <div class="stat-label">亏损次数</div>
                        <div class="stat-value">${r.losingTrades}</div>
                    </div>`;
                    
                    html += `<div class="stat-card">
                        <div class="stat-label">盈亏比</div>
                        <div class="stat-value">${r.profitLossRatio.toFixed(2)}</div>
                    </div>`;
                    
                    html += `<div class="stat-card">
                        <div class="stat-label">夏普比率</div>
                        <div class="stat-value">${r.sharpeRatio.toFixed(2)}</div>
                    </div>`;
                    
                    html += `<div class="stat-card">
                        <div class="stat-label">最大回撤率</div>
                        <div class="stat-value">${r.maxDrawdownRate.toFixed(2)}%</div>
                    </div>`;
                    
                    html += `<div class="stat-card">
                        <div class="stat-label">总手续费</div>
                        <div class="stat-value">$${r.totalFee.toFixed(2)}</div>
                    </div>`;
                    
                    html += '</div>';
                    statsDiv.innerHTML = html;
                }
                
                // 加载交易记录
                const tradesResponse = await fetch(`/api/backtest/trades/${backtestId}`);
                const tradesData = await tradesResponse.json();
                
                if (tradesData.success && tradesData.trades.length > 0) {
                    let html = '<table><thead><tr>';
                    html += '<th>序号</th><th>方向</th><th>开仓价</th><th>止损</th><th>止盈</th><th>平仓价</th>';
                    html += '<th>盈亏</th><th>盈亏率</th><th>持仓时长</th><th>平仓原因</th><th>信号依据</th><th>开仓时间</th>';
                    html += '</tr></thead><tbody>';

                    tradesData.trades.forEach((t, index) => {
                        const profitColor = t.profitLoss >= 0 ? 'green' : 'red';
                        html += '<tr>';
                        html += `<td>${index + 1}</td>`;
                        html += `<td><span class="badge ${t.side === 'BUY' ? 'badge-success' : 'badge-danger'}">${t.side === 'BUY' ? '做多' : '做空'}</span></td>`;
                        html += `<td>$${t.entryPrice.toFixed(2)}</td>`;
                        html += `<td style="color:#dc3545;">$${t.stopLossPrice ? t.stopLossPrice.toFixed(2) : 'N/A'}</td>`;
                        html += `<td style="color:#28a745;">$${t.takeProfitPrice ? t.takeProfitPrice.toFixed(2) : 'N/A'}</td>`;
                        html += `<td>$${t.exitPrice ? t.exitPrice.toFixed(2) : 'N/A'}</td>`;
                        html += `<td style="color: ${profitColor}; font-weight: bold;">$${t.profitLoss.toFixed(2)}</td>`;
                        html += `<td style="color: ${profitColor};">${t.profitLossRate.toFixed(2)}%</td>`;
                        html += `<td>${t.holdingMinutes}分钟</td>`;
                        html += `<td><span class="badge badge-${t.exitReason === 'TAKE_PROFIT' ? 'success' : t.exitReason === 'STOP_LOSS' ? 'danger' : 'warning'}">${t.exitReason}</span></td>`;
                        html += `<td style="font-size:12px;color:#555;max-width:200px;word-break:break-all;">${t.signalDescription || ''}</td>`;
                        html += `<td>${new Date(t.entryTime).toLocaleString('zh-CN')}</td>`;
                        html += '</tr>';
                    });
                    
                    html += '</tbody></table>';
                    tradesDiv.innerHTML = html;
                } else {
                    tradesDiv.innerHTML = '<p style="text-align: center; padding: 40px; color: #666;">无交易记录</p>';
                }
            } catch (error) {
                statsDiv.innerHTML = `<p style="color: red;">加载失败: ${error.message}</p>`;
            }
        }

        // 显示提示信息
        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.className = `alert alert-${type}`;
            alertBox.textContent = message;
            alertBox.classList.remove('hidden');
            
            setTimeout(() => {
                alertBox.classList.add('hidden');
            }, 5000);
        }
    </script>
</body>
</html>
