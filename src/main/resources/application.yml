server:
  port: 3131
  servlet:
    context-path: /api

spring:
  application:
    name: aug-trade
  
  # MySQL数据源配置（使用HikariCP连接池）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/aug?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 12345678
    
    # HikariCP连接池配置
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  # Redis配置（可选）- 如果未安装Redis请保持注释状态
#  redis:
#    host: localhost
#    port: 6379
#    password:
#    database: 0
#    timeout: 3000
#    lettuce:
#      pool:
#        max-active: 8
#        max-idle: 8
#        min-idle: 0
#        max-wait: -1

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.ltp.peter.augtrade.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false


# 日志配置
logging:
  level:
    com.ltp.peter.augtrade: debug
    com.ltp.peter.augtrade.mapper: error
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
  file:
    name: logs/aug-trade.log
    max-size: 10MB
    max-history: 30

# Bybit API配置（正式网 - 模拟交易模式）⭐⭐⭐⭐⭐
bybit:
  api:
    enabled: false                          # ❌ 已禁用Bybit（切换到币安）
    key: 你的正式网API-Key                   # 仅用于获取价格（可不填）
    secret: 你的正式网API-Secret             # 仅用于获取价格（可不填）
    testnet: false                          # ✅ 正式网（获取真实价格）
    paper-trading: true                     # ✅ 模拟交易模式（不实际下单）
  gold:
    symbol: XAUTUSDT                        # ✅ 黄金永续合约（统一使用XAUTUSDT）
    min-qty: 10
    max-qty: 100
    leverage: 2                             # ⭐ 2倍杠杆（正式网建议保守）

# 币安 API配置（现货+合约）🌟🌟🌟🌟🌟
binance:
  api:
    enabled: true                           # ✅ 已启用币安
    key: ""                                 # ⚠️ 实盘交易必填：请填写您的币安API Key
    secret: ""                              # ⚠️ 实盘交易必填：请填写您的币安API Secret
    testnet: false                          # ✅ 正式网（获取真实价格）
  
  # 现货交易配置
  gold:
    symbol: PAXGUSDT                        # ✅ Paxos黄金代币（现货）
  live:
    mode: false                             # ⚠️ 现货实盘开关
    max-order-amount: 0.01                  # 🔒 单笔最大数量（PAXG）
    max-daily-trades: 20                    # 🔒 每日最大交易次数
    max-daily-loss: 500.0                   # 🔒 每日最大亏损限制（USD）
  
  # 🔥 合约交易配置（XAUUSDT永续合约）
  futures:
    symbol: XAUUSDT                         # ✅ 黄金永续合约
    live-mode: false                        # ⚠️ 合约实盘开关（false=只读，true=实盘）
    max-order-amount: 10                    # 🔒 单笔最大数量（整数，如10=10盎司）
    max-daily-trades: 20                    # 🔒 每日最大交易次数
    max-daily-loss: 500.0                   # 🔒 每日最大亏损（USD）
    leverage: 2                             # 🔒 杠杆倍数（1-125，建议2-5）
  
  # 🔥 币安风控配置（统一配置）
  risk:
    # 止损止盈模式：fixed（固定）/ atr（动态ATR）
    mode: atr                               # 🔥 P0修复：改为ATR动态模式，根据市场波动自动调整
    
    # 固定模式参数（mode=fixed时使用）
    stop-loss-dollars: 8                    # 🔥 P0修复：从15提高到18，避免被小幅波动扫损
    take-profit-dollars: 15                 # ✅ 固定止盈$45/盎司（总$450，盈亏比1:2.5）
    
    # ATR动态模式参数（mode=atr时使用）
    atr-stop-loss-multiplier: 3.0           # 🔥 P0修复-20260121：从2.0提高到3.0，给盈利单更多空间
    atr-take-profit-multiplier: 4.0         # 🔥 P0修复-20260121：从2.0提高到4.0，让利润奔跑
    atr-period: 14                          # ATR计算周期
    atr-min-threshold: 1.0                  # 🔥 P0修复-20260119：从2.5降到1.0，黄金正常波动范围（ATR通常1.0-3.0）
    atr-max-threshold: 15.0                 # 🔥 P0修复-20260129：从6.0提高到15.0，适应当前高波动市场（ATR=11.99）

# 交易平台配置
trading:
  # 比特币交易配置（单仓位模式）
  gold:
    symbol: BTCUSDT
    min-trade-amount: 0.001      # BTC: 0.001个 ⭐
    max-trade-amount: 0.001      # BTC: 0.001个 ⭐
    
  # 风控配置（旧版，由 RiskManagementService 读取，仅用于持仓规模和日亏损检查）
  # ⚠️ 注意：实际止损/止盈由 binance.risk 配置控制（ATR动态模式），以下 fixed-stop-loss/take-profit 已不生效
  risk:
    max-position-size: 0.001     # 最大持仓0.001 BTC
    max-daily-loss: 500          # 日亏损上限$500
    max-drawdown-percent: 5.0    # 最大回撤5%
    fixed-stop-loss: 10          # 旧版固定止损（已被 binance.risk.mode=atr 取代，不生效）
    fixed-take-profit: 15        # 旧版固定止盈（已被 binance.risk.mode=atr 取代，不生效）
    max-holding-minutes: 30      # 最长持仓30分钟
    max-single-loss: 50.0        # 单笔最大亏损$50（防止止损失效）
    
    # 移动止损配置（利润最大化）🚀
    trailing-stop:
      enabled: true              # ✅ 启用移动止损
      trigger-profit: 30.0       # 🔥 优化-20260126：从20.0提高到30.0，减少过早触发和被扫
      distance: 12.0             # 🔥 优化-20260126：从8.0提高到12.0，给价格更大回调空间
      lock-profit-percent: 60.0  # 🔥 优化-20260126：从50%提高到60%，锁定更多利润
    
  # 策略配置
  strategy:
    # 🎯 策略工厂：只需修改这一行切换策略！
    active: sr_rejection    # 🔥 20260330：切换到SR拒绝策略（支撑阻力位拒绝 + StochRSI确认）
    
    enabled: true
    interval: 60000  # 🔥 P0修复：从10秒延长到60秒，减少噪音交易
    
    # 🔥 优化版方案C - 禁用滞后策略（2026-03-09）
    # 移除3个滞后指标策略，保留高实时性策略
    rsi:
      enabled: false  # ❌ 禁用RSI策略（与Williams %R重复，滞后）
    bollinger-breakout:
      enabled: false  # ❌ 禁用布林带突破策略（20根K线滞后严重）
    balanced-aggressive:
      enabled: false  # ❌ 禁用均衡激进策略（包含MACD等滞后指标）
    
  # 数据采集配置
  data-collector:
    enabled: true
    interval: 60000  # 数据采集间隔（毫秒，币安建议不要太频繁）
    source: binance  # 数据源: mock/binance/alphavantage
    
  # 币安配置
  binance:
    symbol: BTCUSDT   # 比特币交易对 ⚡
    interval: 1m      # K线周期: 1m, 5m, 15m, 30m, 1h, 4h, 1d
  
  # 启动时数据加载配置
  startup:
    load-klines: true         # ✅ 启用启动时加载K线数据
    klines-count: 200         # 加载最近200条K线（5分钟周期 = 约16.7小时的数据）

# 飞书通知配置
feishu:
  notification:
    enabled: true                          # ✅ 启用飞书通知（默认关闭）
  webhook:
    url: "https://open.feishu.cn/open-apis/bot/v2/hook/24c96d2d-c715-481e-87fb-dddf75601c77"  # 飞书机器人Webhook URL
    secret: ""                             # 飞书机器人签名密钥（如果启用了签名校验，请填写）
  mention:
    enabled: true                          # ✅ 启用@提醒功能
    user-id: "ou_89dd79eb398de67b445f86e18dff68b2"                            # 飞书用户ID（open_id格式，例如：ou_xxxxx）
                                           # 获取方式：在飞书群中，点击群成员 -> 复制用户ID
                                           # 留空则不会@任何人
